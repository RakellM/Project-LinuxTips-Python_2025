name: CI

on: 
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

  workflow_dispatch:


permissions:
  checks: write
  pull-requests: write
  contents: read


jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12']
        os: [ubuntu-latest]
    runs-on: ${{matrix.os}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{matrix.python-version}}
      - name: Install Project 
        run: pip install '.[test]'
      - name: Run tests 
        run: make testci
      - name: Publish junit results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            **/test-result.xml
            test-result.xml
          check_name: Test Result (Python ${{matrix.python-version}})
